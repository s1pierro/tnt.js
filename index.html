<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TouchEngine + CursorKinematics</title>
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>
<style>
  *, *::before, *::after {
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; touch-action: none; }
  body { font-family: sans-serif; height: 100vh; overflow: hidden; }

  #stage {
    width: 100%; height: 100vh;
    background: #111;
    position: relative;
    touch-action: none;
    overscroll-behavior: none;
  }

  #btn-fullscreen {
    position: absolute; top: 10px; right: 10px; z-index: 9999;
    background: rgba(255,255,255,0.08); color: #ccc;
    border: 1px solid rgba(255,255,255,0.15); border-radius: 6px;
    padding: 6px 10px; font-size: 16px; cursor: pointer;
    touch-action: manipulation; line-height: 1;
    transition: background 0.15s;
  }
  #btn-fullscreen:active { background: rgba(255,255,255,0.2); }
</style>
</head>
<body>

<div id="stage">
  <button id="btn-fullscreen" title="Plein écran">⛶</button>
</div>

<script type="module">
import { TouchOverlay, DropCursor, TouchPanel } from './tnt.js';

document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('selectstart', e => e.preventDefault());
document.addEventListener('dblclick',    e => e.preventDefault());

const stage = document.getElementById('stage');

// ── Canvas de marqueurs & traînée ─────────────────────────────────────────
const markerCanvas = document.createElement('canvas');
markerCanvas.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;';
stage.appendChild(markerCanvas);
const mCtx = markerCanvas.getContext('2d');

function resizeCanvas() {
  markerCanvas.width  = stage.clientWidth;
  markerCanvas.height = stage.clientHeight;
}
resizeCanvas();
new ResizeObserver(resizeCanvas).observe(stage);

const markers = [];
const trail   = [];

const COLORS = {
  tap:           '#0ff',
  press:         '#ff0',
  longPress:     '#f0f',
  cancel:        '#f44',
  cursorActivate:'#0f8',
  cursorRelease: '#8fc',
  cancelCursor:  '#f88',
  catchAt:       '#08f',
  catchDrop:     '#7cf',
  pinchStart:    '#f80',
  pinchEnd:      '#fc8',
};

function nowStamp() {
  const d = new Date();
  return [d.getHours(), d.getMinutes(), d.getSeconds()]
    .map(n => String(n).padStart(2, '0')).join(':')
    + '.' + String(d.getMilliseconds()).padStart(3, '0');
}

function mark(name, x, y) {
  markers.push({ name, x, y, color: COLORS[name] ?? '#fff', born: performance.now(), stamp: nowStamp() });
}

function addTrail(x, y, color) {
  if (!panel.trailEnabled) return;
  trail.push({ x, y, color, born: performance.now() });
}

(function loop() {
  mCtx.clearRect(0, 0, markerCanvas.width, markerCanvas.height);
  const now = performance.now();
  const TRAIL_TTL  = panel.trailTtl;
  const MARKER_TTL = panel.markerTtl;

  for (let i = trail.length - 1; i >= 0; i--) {
    const t = trail[i], age = now - t.born;
    if (age > TRAIL_TTL) { trail.splice(i, 1); continue; }
    const p = age / TRAIL_TTL;
    mCtx.globalAlpha = (1 - p) * 0.75;
    mCtx.fillStyle   = t.color;
    mCtx.beginPath();
    mCtx.arc(t.x, t.y, 3 * (1 - p * 0.5), 0, Math.PI * 2);
    mCtx.fill();
  }

  for (let i = markers.length - 1; i >= 0; i--) {
    const m = markers[i], age = now - m.born;
    if (age > MARKER_TTL) { markers.splice(i, 1); continue; }
    mCtx.globalAlpha = 1 - age / MARKER_TTL;
    const R = 14, arm = 7;
    mCtx.strokeStyle = m.color;
    mCtx.lineWidth   = 1.5;
    mCtx.beginPath(); mCtx.arc(m.x, m.y, R, 0, Math.PI * 2); mCtx.stroke();
    mCtx.beginPath();
    mCtx.moveTo(m.x - R - arm, m.y); mCtx.lineTo(m.x + R + arm, m.y);
    mCtx.moveTo(m.x, m.y - R - arm); mCtx.lineTo(m.x, m.y + R + arm);
    mCtx.stroke();
    mCtx.fillStyle = m.color;
    mCtx.font = 'bold 11px monospace';
    mCtx.fillText(m.name,  m.x + R + 8, m.y + 1);
    mCtx.font = '10px monospace';
    mCtx.fillText(m.stamp, m.x + R + 8, m.y + 13);
  }
  mCtx.globalAlpha = 1;
  requestAnimationFrame(loop);
})();

// ── TNT ───────────────────────────────────────────────────────────────────
const overlay = new TouchOverlay(stage);
const engine  = overlay.engine;
const kine    = overlay.kine;

const drop = new DropCursor(stage, {
  x:     stage.clientWidth  * 0.35,
  y:     stage.clientHeight * 0.5,
  angle: -30,
  size:  overlay.contactSize,
  height: engine.dist,
});

const panel = new TouchPanel(overlay, { drop });

// DropCursor interactive uniquement en idle
engine.on('stateChange', e => { drop.interactive = (e.state === 'idle'); });

// Marques canvas (le panel gère l'affichage texte en interne)
engine.on('tap',       e => mark('tap',       e.x, e.y));
engine.on('press',     e => mark('press',     e.x, e.y));
engine.on('longPress', e => mark('longPress', e.x, e.y));
engine.on('cancel',    e => mark('cancel',    e.x, e.y));
engine.on('cursorActivate', e => mark('cursorActivate', e.x, e.y));
engine.on('cursorMove',    e => addTrail(e.x, e.y, COLORS.cursorActivate));
engine.on('cursorRelease', e => mark('cursorRelease',  e.x, e.y));
engine.on('cancelCursor',  e => mark('cancelCursor',   e.x, e.y));
engine.on('pinchStart',  e => mark('pinchStart', (e.x1+e.x2)/2, (e.y1+e.y2)/2));
engine.on('pinchChange', e => addTrail((e.x1+e.x2)/2, (e.y1+e.y2)/2, COLORS.pinchStart));
engine.on('pinchEnd',    e => mark('pinchEnd',   e.x, e.y));
engine.on('catchAt',   e => mark('catchAt',   e.x, e.y));
engine.on('catchMove', e => addTrail((e.x1+e.x2)/2, (e.y1+e.y2)/2, COLORS.catchAt));
engine.on('catchDrop', e => mark('catchDrop', e.x, e.y));
drop.on('click', e => mark('tap', e.x, e.y));

// Fullscreen
const btnFullscreen = document.getElementById('btn-fullscreen');
btnFullscreen.addEventListener('click', () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen().catch(() => {});
  }
});
document.addEventListener('fullscreenchange', () => {
  btnFullscreen.textContent = document.fullscreenElement ? '✕' : '⛶';
});
</script>

</body>
</html>
