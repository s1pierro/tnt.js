<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TouchEngine + CursorKinematics</title>
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>
<style>
  *, *::before, *::after {
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
    -webkit-overscroll-behavior: none;
  }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    touch-action: none;
  }

  body {
    font-family: sans-serif;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  #stage {
    flex: 1;
    background: #111;
    position: relative;
    touch-action: none;
    overscroll-behavior: none;
  }


  #panel {
    width: 260px;
    min-width: 36px;
    height: 100vh;
    background: #1e1e1e;
    color: #ddd;
    box-sizing: border-box;
    overflow: hidden;
    transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
  }

  #panel-inner {
    flex: 1;
    padding: 0 10px 10px;
    overflow-y: auto;
    overflow-x: hidden;
    opacity: 1;
    transition: opacity 0.2s ease;
  }

  #panel.collapsed #panel-inner {
    opacity: 0;
    pointer-events: none;
    overflow: hidden;
  }

  #panel.collapsed {
    width: 36px;
  }

  #btn-toggle-panel {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 10px;
    background: #252525;
    color: #aaa;
    border: none;
    border-bottom: 1px solid #333;
    font-size: 12px;
    font-weight: bold;
    letter-spacing: 0.5px;
    cursor: pointer;
    touch-action: manipulation;
    box-sizing: border-box;
    flex-shrink: 0;
    white-space: nowrap;
    overflow: hidden;
    transition: background 0.15s;
  }
  #btn-toggle-panel:active { background: #2e2e2e; }

  #btn-toggle-panel .panel-label {
    opacity: 1;
    transition: opacity 0.15s;
  }
  #panel.collapsed #btn-toggle-panel .panel-label {
    opacity: 0;
  }

  #btn-toggle-panel .panel-arrow {
    font-size: 14px;
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  #panel.collapsed #btn-toggle-panel .panel-arrow {
    transform: rotate(180deg);
  }

  h3 { margin: 10px 0 5px; }

  label {
    display: block;
    font-size: 12px;
    margin: 5px 0;
  }

  input { width: 100%; }

  #state-badge {
    display: inline-block;
    font-family: monospace;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 3px;
    background: #555;
    color: #ccc;
    margin-bottom: 8px;
    min-width: 90px;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  #state-badge.idle          { background: #555;  color: #ccc; }
  #state-badge.touching      { background: #268bd2; color: #fff; }
  #state-badge.grabbing      { background: #2aa198; color: #000; }
  #state-badge.cancelled     { background: #dc322f; color: #fff; }
  #state-badge.tapping       { background: #268bd2; color: #fff; }
  #state-badge.pressing      { background: #b58900; color: #000; }
  #state-badge.longPressing  { background: #d33682; color: #fff; }
  #state-badge.pinching      { background: #859900; color: #000; }
  #state-badge.catching      { background: #08f;    color: #fff; }

  /* Statut live : valeurs continues mises à jour en place */
  #event-live {
    font-family: monospace;
    font-size: 11px;
    background: #0a0a0a;
    padding: 3px 6px;
    border-radius: 3px 3px 0 0;
    border-bottom: 1px solid #1a1a1a;
    min-height: 18px;
  }

  /* Historique : événements discrets, défile, hauteur adaptable */
  #event-history {
    font-family: monospace;
    font-size: 12px;
    background: #000;
    padding: 4px 6px;
    border-radius: 0 0 3px 3px;
    max-height: 140px;
    overflow-y: auto;
  }

  .ev { padding: 2px 0; border-bottom: 1px solid #111; }
  .ev-label { color: #888; }
  .ev-state { color: #555; font-size: 10px; }
  .ev-live-row { color: #3a3a5a; font-size: 11px; }
  .ev-live-row .ev-label { color: #445; }

  #btn-export {
    width: 100%;
    padding: 8px;
    background: #2aa198;
    color: #000;
    border: none;
    border-radius: 4px;
    font-size: 13px;
    cursor: pointer;
    margin-bottom: 6px;
  }
  #btn-export:active { background: #1d7a72; }

  #state-history {
    font-family: monospace;
    font-size: 11px;
    background: #000;
    padding: 4px 6px;
    border-radius: 3px;
    max-height: 160px;
    overflow-y: auto;
    display: flex;
    flex-direction: column-reverse;
  }

  .hist-row {
    display: flex;
    align-items: baseline;
    gap: 5px;
    padding: 2px 0;
    border-bottom: 1px solid #1a1a1a;
  }

  .hist-badge {
    display: inline-block;
    padding: 1px 5px;
    border-radius: 2px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    min-width: 76px;
    text-align: center;
    flex-shrink: 0;
  }
  .hist-badge.idle         { background: #555;    color: #ccc; }
  .hist-badge.tapping      { background: #268bd2; color: #fff; }
  .hist-badge.pressing     { background: #b58900; color: #000; }
  .hist-badge.longPressing { background: #d33682; color: #fff; }
  .hist-badge.grabbing     { background: #2aa198; color: #000; }
  .hist-badge.pinching     { background: #859900; color: #000; }
  .hist-badge.catching     { background: #08f;    color: #fff; }

  .hist-dur {
    color: #555;
    font-size: 10px;
    flex-shrink: 0;
    width: 48px;
    text-align: right;
  }

  #btn-clear-hist, #btn-clear-events {
    width: 100%;
    padding: 4px;
    background: #333;
    color: #888;
    border: none;
    border-radius: 3px;
    font-size: 11px;
    cursor: pointer;
    margin-top: 4px;
  }
  #btn-clear-hist:active, #btn-clear-events:active { background: #444; }

  #btn-fullscreen {
    position: absolute;
    top: 10px;
    right: 10px;
    z-index: 9999;
    background: rgba(255,255,255,0.08);
    color: #ccc;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 16px;
    cursor: pointer;
    touch-action: manipulation;
    line-height: 1;
    transition: background 0.15s;
  }
  #btn-fullscreen:active { background: rgba(255,255,255,0.2); }

  #export-code {
    background: #000;
    color: #b58900;
    font-family: monospace;
    font-size: 11px;
    padding: 8px;
    border-radius: 3px;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 120px;
    overflow-y: auto;
    margin: 0;
  }
</style>
</head>

<body>

<div id="stage">
  <button id="btn-fullscreen" title="Plein écran">⛶</button>
</div>

<div id="panel">
  <button id="btn-toggle-panel">
    <span class="panel-label">Paramètres</span>
    <span class="panel-arrow">›</span>
  </button>
  <div id="panel-inner">
  <h3>⚙️ Apparence</h3>

  <label>
    Contact
    <input id="contactSize" type="range" min="4" max="80" value="24">
  </label>

  <label>
    Curseur
    <input id="cursorSize" type="range" min="4" max="60" value="14">
  </label>

  <label>
    <input id="rodEnabled" type="checkbox" checked> Barre
  </label>

  <label>
    <input id="pulseEnabled" type="checkbox" checked> Pulse
  </label>

  <label>
    Marqueurs (fade ms) <span id="markerTtlVal">3500</span>
    <input id="markerTtl" type="range" min="500" max="10000" step="100" value="3500">
  </label>

  <label>
    <input id="dropEnabled" type="checkbox"> Curseur goutte
  </label>

  <label>
    <input id="trailEnabled" type="checkbox" checked> Traînée
  </label>

  <label>
    Traînée (fade ms) <span id="trailTtlVal">1200</span>
    <input id="trailTtl" type="range" min="100" max="5000" step="100" value="1200">
  </label>

  <h3>⚙️ Cinématique</h3>

  <label>
    Distance
    <input id="dist" type="range" min="20" max="200" value="100">
  </label>

  <h3>⏱ Temporel</h3>

  <label>
    Tapping → Pressing (ms)
    <input id="tappingToPressingFrontier" type="range" min="100" max="2000" step="50" value="500">
  </label>

  <label>
    Pressing → LongPressing (ms)
    <input id="pressingToLongPressingFrontier" type="range" min="200" max="5000" step="50" value="1500">
  </label>

  <h3>📡 Events</h3>
  <div id="state-badge">idle</div>
  <div id="event-live"></div>
  <div id="event-history"></div>
  <button id="btn-clear-events">Effacer</button>

  <h3>📋 Historique</h3>
  <div id="state-history"></div>
  <button id="btn-clear-hist">Effacer</button>

  <h3>📤 Export</h3>
  <button id="btn-export">Copier le JSON</button>
  <pre id="export-code"></pre>
  </div>
</div>

<script type="module">
import { TouchOverlay, DropCursor } from './tnt.js';

document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('selectstart', e => e.preventDefault());
document.addEventListener('dblclick', e => e.preventDefault());

const stage      = document.getElementById('stage');
const stateBadge = document.getElementById('state-badge');
const eventLiveEl    = document.getElementById('event-live');
const eventHistoryEl = document.getElementById('event-history');
const btnClearEvents = document.getElementById('btn-clear-events');
const historyEl   = document.getElementById('state-history');
const btnClearHist = document.getElementById('btn-clear-hist');

const DEFAULTS = {
  contactSize: 24,
  cursorSize: 14,
  rodEnabled: true,
  pulseEnabled: true,
  dist: 60,
  tappingToPressingFrontier:      400,
  pressingToLongPressingFrontier: 1500,
};

const cfg = { ...DEFAULTS, ...JSON.parse(localStorage.getItem('tnt-cfg') || '{}') };

const overlay = new TouchOverlay(stage, {
  dist:                           cfg.dist,
  tappingToPressingFrontier:      cfg.tappingToPressingFrontier,
  pressingToLongPressingFrontier: cfg.pressingToLongPressingFrontier,
  contactSize:  cfg.contactSize,
  cursorSize:   cfg.cursorSize,
  rodEnabled:   cfg.rodEnabled,
  pulseEnabled: cfg.pulseEnabled,
});

const engine = overlay.engine;
const kine   = overlay.kine;

function save() {
  localStorage.setItem('tnt-cfg', JSON.stringify(cfg));
}

function bind(id, key, apply) {
  const el = document.getElementById(id);
  el.addEventListener('input', () => {
    cfg[key] = el.type === 'checkbox' ? el.checked : +el.value;
    apply(cfg[key]);
    save();
    updateExport();
  });
}

function applyAll() {
  contactSize.value  = cfg.contactSize;
  cursorSize.value   = cfg.cursorSize;
  rodEnabled.checked = cfg.rodEnabled;
  pulseEnabled.checked = cfg.pulseEnabled;
  dist.value         = cfg.dist;
  tappingToPressingFrontier.value      = cfg.tappingToPressingFrontier;
  pressingToLongPressingFrontier.value = cfg.pressingToLongPressingFrontier;
}

applyAll();

// ── Canvas de marqueurs ───────────────────────────────────────────────────────
const markerCanvas = document.createElement('canvas');
markerCanvas.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;';
stage.appendChild(markerCanvas);
const mCtx = markerCanvas.getContext('2d');

function resizeMarkerCanvas() {
  markerCanvas.width  = stage.clientWidth;
  markerCanvas.height = stage.clientHeight;
}
resizeMarkerCanvas();
new ResizeObserver(resizeMarkerCanvas).observe(stage);

let   MARKER_TTL  = 3500;
const markers     = [];

let   TRAIL_TTL   = 1200;
let   trailEnabled = true;
const trail        = [];

const MARKER_COLORS = {
  tap:           '#0ff',
  press:         '#ff0',
  longPress:     '#f0f',
  cancel:        '#f44',
  cursorActivate:'#0f8',
  cursorRelease: '#8fc',
  cancelCursor:  '#f88',
  catchAt:       '#08f',
  catchDrop:     '#7cf',
  pinchStart:    '#f80',
  pinchEnd:      '#fc8',
};

function nowStamp() {
  const d = new Date();
  return [d.getHours(), d.getMinutes(), d.getSeconds()]
    .map(n => n.toString().padStart(2, '0')).join(':')
    + '.' + d.getMilliseconds().toString().padStart(3, '0');
}

function mark(name, x, y) {
  const color = MARKER_COLORS[name] ?? '#fff';
  markers.push({ name, x, y, color, stamp: nowStamp(), born: performance.now() });
}

function addTrail(x, y, color) {
  if (!trailEnabled) return;
  trail.push({ x, y, color, born: performance.now() });
}

(function loop() {
  mCtx.clearRect(0, 0, markerCanvas.width, markerCanvas.height);
  const now = performance.now();

  // ── Traînée ──────────────────────────────────────────────────────────────
  for (let i = trail.length - 1; i >= 0; i--) {
    const t   = trail[i];
    const age = now - t.born;
    if (age > TRAIL_TTL) { trail.splice(i, 1); continue; }
    const progress = age / TRAIL_TTL;            // 0 → 1
    const alpha    = (1 - progress) * 0.75;
    const radius   = 3 * (1 - progress * 0.5);  // rétrécit légèrement
    mCtx.globalAlpha = alpha;
    mCtx.fillStyle   = t.color;
    mCtx.beginPath();
    mCtx.arc(t.x, t.y, radius, 0, Math.PI * 2);
    mCtx.fill();
  }

  for (let i = markers.length - 1; i >= 0; i--) {
    const m   = markers[i];
    const age = now - m.born;
    if (age > MARKER_TTL) { markers.splice(i, 1); continue; }

    mCtx.globalAlpha = 1 - age / MARKER_TTL;

    const R = 14, arm = 7;
    mCtx.strokeStyle = m.color;
    mCtx.lineWidth   = 1.5;
    mCtx.beginPath();
    mCtx.arc(m.x, m.y, R, 0, Math.PI * 2);
    mCtx.stroke();
    mCtx.beginPath();
    mCtx.moveTo(m.x - R - arm, m.y); mCtx.lineTo(m.x + R + arm, m.y);
    mCtx.moveTo(m.x, m.y - R - arm); mCtx.lineTo(m.x, m.y + R + arm);
    mCtx.stroke();

    mCtx.fillStyle = m.color;
    mCtx.font = 'bold 11px monospace';
    mCtx.fillText(m.name,  m.x + R + 8, m.y + 1);
    mCtx.font = '10px monospace';
    mCtx.fillText(m.stamp, m.x + R + 8, m.y + 13);
  }

  mCtx.globalAlpha = 1;
  requestAnimationFrame(loop);
})();
// ─────────────────────────────────────────────────────────────────────────────

bind('contactSize',  'contactSize',  v => { overlay.contactSize  = v; drop.size   = v; });
bind('cursorSize',   'cursorSize',   v => { overlay.cursorSize   = v; });
bind('rodEnabled',   'rodEnabled',   v => { overlay.rodEnabled   = v; });
bind('pulseEnabled', 'pulseEnabled', v => { overlay.pulseEnabled = v; });

const markerTtlInput = document.getElementById('markerTtl');
const markerTtlVal   = document.getElementById('markerTtlVal');
markerTtlInput.addEventListener('input', () => {
  MARKER_TTL = parseInt(markerTtlInput.value, 10);
  markerTtlVal.textContent = MARKER_TTL;
});

// Drop cursor
const drop = new DropCursor(stage, {
  x:      stage.clientWidth  * 0.35,
  y:      stage.clientHeight * 0.5,
  angle:  -30,
  size:   cfg.contactSize,
  height: cfg.dist,
});
document.getElementById('dropEnabled').addEventListener('change', e => {
  drop.enabled = e.target.checked;
});
drop.on('click',  e => { showEvent('drop:click',  e); mark('tap', e.x, e.y); });
drop.on('move',   e => { showEvent('drop:move',   e); });
drop.on('orient', e => { showEvent('drop:orient', e); });

const trailEnabledInput = document.getElementById('trailEnabled');
trailEnabledInput.addEventListener('change', () => { trailEnabled = trailEnabledInput.checked; });

const trailTtlInput = document.getElementById('trailTtl');
const trailTtlVal   = document.getElementById('trailTtlVal');
trailTtlInput.addEventListener('input', () => {
  TRAIL_TTL = parseInt(trailTtlInput.value, 10);
  trailTtlVal.textContent = TRAIL_TTL;
});
bind('dist', 'dist', v => { engine.dist = v; kine.dist = v; drop.height = v; });
bind('tappingToPressingFrontier',      'tappingToPressingFrontier',      v => { engine.tappingToPressingFrontier      = v; });
bind('pressingToLongPressingFrontier', 'pressingToLongPressingFrontier', v => { engine.pressingToLongPressingFrontier = v; });

let lastEvent = null;

function setState(state) {
  stateBadge.textContent = state;
  stateBadge.className = state;
}

// ── State history ─────────────────────────────────────────────────────────────
let _histLastStamp = Date.now();

function addHistEntry(state) {
  const now = Date.now();
  const dur = now - _histLastStamp;
  _histLastStamp = now;

  const row   = document.createElement('div');
  row.className = 'hist-row';

  const badge = document.createElement('span');
  badge.className = `hist-badge ${state}`;
  badge.textContent = state;

  const durEl = document.createElement('span');
  durEl.className = 'hist-dur';
  durEl.textContent = dur < 10000 ? `${dur}ms` : `${(dur / 1000).toFixed(1)}s`;

  row.appendChild(badge);
  row.appendChild(durEl);
  historyEl.prepend(row);

  while (historyEl.children.length > 60) historyEl.removeChild(historyEl.lastChild);
}

engine.on('stateChange', e => {
  setState(e.state);
  addHistEntry(e.state);
  drop.interactive = (e.state === 'idle');
});

btnClearHist.addEventListener('click', () => {
  historyEl.innerHTML = '';
  _histLastStamp = Date.now();
});
// ─────────────────────────────────────────────────────────────────────────────


function fmtEvent(name, data) {
  let s = `<span class="ev-label">${name}</span>`;
  if (!data) return s;
  if (data.state      !== undefined) s += ` <span class="ev-state">[${data.state}]</span>`;
  if (data.intensity  !== undefined) s += ` <span class="ev-state">i:${data.intensity.toFixed(2)}</span>`;
  if (data.msAfterMin !== undefined) s += ` <span class="ev-state">+${data.msAfterMin}ms</span>`;
  if (data.precision  !== undefined) s += ` <span class="ev-state">p:${data.precision|0}</span>`;
  if (data.x          !== undefined) s += ` x:${data.x|0}`;
  if (data.y          !== undefined) s += ` y:${data.y|0}`;
  if (data.touchX     !== undefined) s += ` tx:${data.touchX|0}`;
  if (data.touchY     !== undefined) s += ` ty:${data.touchY|0}`;
  if (data.x1         !== undefined) s += ` (${data.x1|0},${data.y1|0})→(${data.x2|0},${data.y2|0})`;
  if (data.scale      !== undefined) s += ` sc:${data.scale.toFixed(2)}`;
  if (data.angle      !== undefined) s += ` <span class="ev-state">∠${data.angle.toFixed(1)}°</span>`;
  if (data.duration   !== undefined) s += ` <span class="ev-state">${data.duration|0}ms</span>`;
  return s;
}

const MAX_EVENT_HISTORY = 60;

function showEvent(name, data, live = false) {
  lastEvent = { name, data, time: Date.now() };

  if (live) {
    // Zone statut : une ligne par type, mise à jour en place
    let row = eventLiveEl.querySelector(`[data-ev="${name}"]`);
    if (!row) {
      row = document.createElement('div');
      row.className = 'ev ev-live-row';
      row.dataset.ev = name;
      eventLiveEl.appendChild(row);
    }
    row.innerHTML = fmtEvent(name, data);
  } else {
    // Historique : nouvelle ligne en tête, trim par le bas
    const row = document.createElement('div');
    row.className = 'ev';
    row.innerHTML = fmtEvent(name, data);
    eventHistoryEl.prepend(row);
    while (eventHistoryEl.children.length > MAX_EVENT_HISTORY) {
      eventHistoryEl.removeChild(eventHistoryEl.lastChild);
    }
  }
}

btnClearEvents.addEventListener('click', () => {
  eventHistoryEl.innerHTML = '';
  eventLiveEl.innerHTML    = '';
});

engine.on('cursorActivate', e => { showEvent('cursorActivate', e); mark('cursorActivate', e.x, e.y); });
engine.on('cursorMove',    e => { showEvent('cursorMove', e, true); addTrail(e.x, e.y, MARKER_COLORS.cursorActivate); });
engine.on('cursorRelease', e => { showEvent('cursorRelease', e);  mark('cursorRelease',  e.x, e.y); });
engine.on('cancelCursor',  e => { showEvent('cancelCursor',  e);  mark('cancelCursor',   e.x, e.y); });

engine.on('cancel',    e => { showEvent('cancel',    e); mark('cancel',    e.x, e.y); });
engine.on('tap',       e => { showEvent('tap',       e); mark('tap',       e.x, e.y); });
engine.on('press',     e => { showEvent('press',     e); mark('press',     e.x, e.y); });
engine.on('longPress', e => { showEvent('longPress', e); mark('longPress', e.x, e.y); });

engine.on('pinchStart',  e => { showEvent('pinchStart', e);  mark('pinchStart', (e.x1 + e.x2) / 2, (e.y1 + e.y2) / 2); });
engine.on('pinchChange', e => { showEvent('pinchChange', e, true); addTrail((e.x1 + e.x2) / 2, (e.y1 + e.y2) / 2, MARKER_COLORS.pinchStart); });
engine.on('pinchEnd',    e => { showEvent('pinchEnd', e); mark('pinchEnd', e.x, e.y); });

engine.on('catchAt',   e => { showEvent('catchAt',   e); mark('catchAt',   e.x, e.y); });
engine.on('catchMove', e => { showEvent('catchMove',  e, true); addTrail((e.x1 + e.x2) / 2, (e.y1 + e.y2) / 2, MARKER_COLORS.catchAt); });
engine.on('catchDrop', e => { showEvent('catchDrop',  e); mark('catchDrop', e.x, e.y); });

const exportCode = document.getElementById('export-code');
const btnExport = document.getElementById('btn-export');

function buildExport() {
  const engineOpts = {
    dist:                           cfg.dist,
    tappingToPressingFrontier:      cfg.tappingToPressingFrontier,
    pressingToLongPressingFrontier: cfg.pressingToLongPressingFrontier,
  };
  const kineOpts = { dist: cfg.dist };
  const visualOpts = {
    contactSize: cfg.contactSize,
    cursorSize: cfg.cursorSize,
    rodEnabled: cfg.rodEnabled,
    pulseEnabled: cfg.pulseEnabled,
  };
  const note = `
// normalized intensity (0-1):
// tap:       dt / tappingToPressingFrontier
// press:     (dt - b1) / (b2 - b1)   where b1=tappingToPressingFrontier, b2=pressingToLongPressingFrontier
// longPress: dt - pressingToLongPressingFrontier  (ms au-delà de la frontière)
`;
  return `// TouchEngine
new TouchEngine(element, ${JSON.stringify(engineOpts, null, 2)});

// CursorKinematics
new CursorKinematics(${JSON.stringify(kineOpts, null, 2)});

// TouchOverlay (full overlay with DOM)
new TouchOverlay(element, {
  ...${JSON.stringify({ ...visualOpts, dist: cfg.dist }, null, 2)},
});` + note;
}

function updateExport() {
  exportCode.textContent = buildExport();
}

btnExport.addEventListener('click', () => {
  const text = buildExport();
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => {
      btnExport.textContent = '✓ Copié !';
      setTimeout(() => { btnExport.textContent = 'Copier le JSON'; }, 1500);
    }).catch(function() { fallbackCopy(); });
  } else {
    fallbackCopy();
  }
});

function fallbackCopy() {
  const range = document.createRange();
  range.selectNodeContents(exportCode);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  try {
    document.execCommand('copy');
    btnExport.textContent = '✓ Copié !';
  } catch (err) {
    btnExport.textContent = 'Erreur';
  }
  setTimeout(() => { btnExport.textContent = 'Copier le JSON'; }, 1500);
}

updateExport();

// Toggle panel
const btnTogglePanel = document.getElementById('btn-toggle-panel');
const panel = document.getElementById('panel');
btnTogglePanel.addEventListener('click', () => {
  panel.classList.toggle('collapsed');
});

// Fullscreen
const btnFullscreen = document.getElementById('btn-fullscreen');
btnFullscreen.addEventListener('click', () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
    btnFullscreen.textContent = '✕';
  } else {
    document.exitFullscreen().catch(() => {});
  }
});
document.addEventListener('fullscreenchange', () => {
  btnFullscreen.textContent = document.fullscreenElement ? '✕' : '⛶';
});
</script>
